<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel_AI_Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>Travel_AI_Agent</h2>
      <p>🟢 Deployed · Online</p>
    </div>
    <div class="chat-box">
      <div class="message agent">
        <div class="agent-title">Travel_AI_Agent 04:26 PM</div>
        <div class="message-text">
          <strong>Welcome to Travel_AI_Agent</strong><br/>
          🌍 I’m your Travel AI agent – craft trips ✈️, book hotels 🏖️, suggest spots 📍—all your way!
        </div>
        <img src="plane.png" alt="paper plane" class="plane-img" />
      </div>
    </div>
    <form class="input-area" onsubmit="handleSubmit(event)">
      <input type="text" id="user-input" placeholder="Type something..." required />
      <button type="submit">➤</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
